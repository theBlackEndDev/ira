# PAI Security Patterns v3.0 — Example Template
# Copy to USER/SECURITY/PATTERNS.yaml and customize.
# SecurityPipeline loads USER patterns first, falls back to this.
#
# DESIGN: Block catastrophic ops, alert on suspicious, allow everything else.
# ZERO confirm patterns — prompts cause friction. Use blocked (silent deny)
# or alert (log + allow) only.
#
# Pattern syntax: JavaScript RegExp (case-insensitive via 'i' flag)
# matchesPattern() does regex.test(fullCommand) — matches anywhere in string
---
version: "3.0"
last_updated: "2026-03-31"

philosophy:
  mode: targeted
  principle: "Block catastrophic operations silently. Alert on suspicious. Never prompt. Fail closed on missing config."

bash:
  # TRUSTED — Fast-path allow, skip all pattern checking
  trusted: []

  # BLOCKED — Hard deny via exit(2). No prompt, no workaround.
  blocked:
    # ── Filesystem destruction ────────────────────────────────────
    - pattern: "rm\\s.*-\\w*r.*\\s+/(\\s|$)"
      reason: "Recursive deletion of system root"
    - pattern: "rm\\s.*-\\w*r.*\\s+~/?(\\s|$)"
      reason: "Recursive deletion of home directory"

    # ── Credential access via shell ──────────────────────────────
    - pattern: "cat.*\\.env"
      reason: "Reading .env file via cat (use Read tool or secrets utility)"
    - pattern: "source.*\\.env"
      reason: "Sourcing .env file into shell environment"

    # ── Credential exfiltration in outbound commands ─────────────
    - pattern: "sk_live_"
      reason: "Stripe live key detected in command string"
    - pattern: "sk-ant-"
      reason: "Anthropic API key detected in command string"
    - pattern: "PRIVATE KEY"
      reason: "Private key material detected in command string"

    # ── Pipe to shell (universal) ────────────────────────────────
    - pattern: "\\|\\s*(sh|bash|zsh)\\b"
      reason: "Piping output to shell interpreter"

  # ALERT — Logged but allowed. Visibility without friction.
  alert:
    - pattern: "curl.*\\|.*sh"
      reason: "Piping curl to shell"
    - pattern: "git push.*--force"
      reason: "Force push (logged for audit)"
    - pattern: "git reset --hard"
      reason: "Hard reset (logged for audit)"
    - pattern: "DROP DATABASE"
      reason: "Database drop (logged for audit)"

    # ── Outbound data exfiltration (alert, not block) ────────────
    - pattern: "curl.*(-X POST|--data|\\s-d\\s)"
      reason: "Outbound HTTP POST via curl (logged for audit)"

    # ── Environment variable dump (credential exposure) ──────────
    - pattern: "^(printenv|env)\\s*$"
      reason: "Full environment variable dump (credential exposure risk)"

paths:
  # ZERO ACCESS — Hard block on read, write, and delete
  zeroAccess:
    - "~/.ssh/id_*"
    - "~/.ssh/*.pem"
    - "~/.aws/credentials"
    - "**/.env"
    - "**/.env.*"

  # READ ONLY — Can read, cannot write or delete
  readOnly: []

  # NO DELETE — Can read and modify but cannot delete
  noDelete: []

projects: {}
