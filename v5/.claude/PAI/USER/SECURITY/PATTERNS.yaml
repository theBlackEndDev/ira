# PAI Security Patterns v3.1
#
# DESIGN: Block catastrophic ops, alert on suspicious, allow everything else.
# ZERO confirm patterns — prompts cause friction. Use blocked (silent deny)
# or alert (log + allow) only.
#
# Pattern syntax: JavaScript RegExp (case-insensitive via 'i' flag)
# matchesPattern() does regex.test(fullCommand) — matches anywhere in string
#
# FAIL-CLOSED: Missing or corrupt PATTERNS.yaml → block ALL commands.
#
# Logging: All blocked/alerted events → MEMORY/SECURITY/YYYY/MM/
---
version: "3.1"
last_updated: 2026-04-04
philosophy:
  mode: targeted
  principle: Block catastrophic operations silently. Prompt for sensitive file access. Alert on suspicious. Fail closed on missing config.
bash:
  trusted:
    - pattern: ^playwright-cli\b
      reason: Playwright CLI - Browser skill automation tool
    - pattern: ^bunx playwright\b
      reason: Playwright one-shot commands - Browser skill
    - pattern: ^agent-browser\b
      reason: agent-browser CLI - Browser skill automation daemon
    - pattern: ^rm\s+(?!.*\.\.).*\bPAI_RELEASES(/|\b)
      reason: PAI release rebuild — staging dir, regenerated by ShadowRelease.ts
  blocked:
    - pattern: rm\s.*-\w*r.*\s+/(\s|$)
      reason: Recursive deletion of system root (/).
    - pattern: rm\s.*-\w*r.*\s+~/?(\s|$)
      reason: Recursive deletion of home directory (~)
    - pattern: rm\s.*-\w*r.*\s(~/\.claude|/Users/[^/]+/\.claude|\$HOME/\.claude)/?(\s|$|;|&&)
      reason: Recursive deletion of ~/.claude (entire PAI infrastructure)
    - pattern: rm\s.*-\w*r.*\s(~/\.claude|/Users/[^/]+/\.claude|\$HOME/\.claude)/PAI/?(\s|$|;|&&)
      reason: Recursive deletion of PAI directory
    - pattern: rm\s.*-\w*r.*\s(~/\.claude|/Users/[^/]+/\.claude|\$HOME/\.claude)/PAI/MEMORY/?(\s|$|;|&&)
      reason: Recursive deletion of PAI/MEMORY directory
    - pattern: rm\s.*-\w*r.*\s+~/Projects/?(\s|$|;|&&)
      reason: Recursive deletion of ~/Projects
    - pattern: diskutil eraseDisk
      reason: Disk destruction
    - pattern: diskutil zeroDisk
      reason: Disk zeroing
    - pattern: diskutil apfs deleteContainer
      reason: APFS container deletion
    - pattern: diskutil apfs eraseVolume
      reason: Volume destruction
    - pattern: dd if=/dev/zero
      reason: Disk overwrite with zeros
    - pattern: mkfs
      reason: Filesystem format
    - pattern: rm\s.*/PAISECURITYSYSTEM/patterns\.yaml
      reason: Deletion of security patterns config (disables all pattern checks)
    - pattern: rm\s.*/hooks/SecurityPipeline\.hook\.ts
      reason: Deletion of security validator hook
    - pattern: rm\s.*/hooks/PromptInjectionScanner\.hook\.ts
      reason: Deletion of prompt injection scanner hook
    - pattern: rm\s.*\.claude/settings\.json
      reason: Deletion of Claude Code settings (contains hook config)
    - pattern: gh repo delete
      reason: GitHub repository deletion
    - pattern: gh repo edit --visibility public
      reason: Repository visibility change to public
    - pattern: (curl|wget|nc|fetch|http).*sk_live_
      reason: Stripe live key detected in command string
    - pattern: (curl|wget|nc|fetch|http).*sk_test_
      reason: Stripe test key detected in command string
    - pattern: (curl|wget|nc|fetch|http).*sk-ant-
      reason: Anthropic API key detected in command string
    - pattern: (curl|wget|nc|fetch|http).*sk-proj-
      reason: OpenAI project key detected in command string
    - pattern: (curl|wget|nc|fetch|http).*PRIVATE KEY
      reason: Private key material detected in command string
    - pattern: (curl|wget|nc|fetch|http).*whsec_
      reason: Webhook signing secret detected in command string
    - pattern: (curl|wget|fetch|aria2c|httpie)\s+[^|]*\|\s*(sh|bash|zsh)\b
      reason: Piping HTTP downloader output to shell interpreter
  alert:
    - pattern: \|\s*(sh|bash|zsh)\s+-c\b
      reason: Piping into shell -c (logged for audit; legitimate uses exist)
    - pattern: git push.*--force
      reason: Force push (logged for audit)
    - pattern: git push.*-f\b
      reason: Force push (logged for audit)
    - pattern: git reset --hard
      reason: Hard reset (logged for audit)
    - pattern: DROP DATABASE
      reason: Database drop (logged for audit)
    - pattern: DROP TABLE
      reason: Table drop (logged for audit)
    - pattern: TRUNCATE
      reason: Table truncate (logged for audit)
    - pattern: terraform destroy
      reason: Infrastructure destruction (logged for audit)
    - pattern: curl.*(-X POST|--data|\s-d\s)
      reason: Outbound HTTP POST via curl (logged for audit)
    - pattern: wget.*(--post-data|--post-file)
      reason: Outbound HTTP POST via wget (logged for audit)
    - pattern: \bnc\s
      reason: Netcat usage (potential data exfiltration)
    - pattern: \bncat\s
      reason: Ncat usage (potential data exfiltration)
    - pattern: \bsocat\s
      reason: Socat usage (potential data exfiltration)
    - pattern: sendmail\b
      reason: Direct sendmail usage (potential email exfiltration)
    - pattern: python3?\s+-c\s
      reason: Python inline execution (logged for audit)
    - pattern: node\s+-e\s
      reason: Node.js inline execution (logged for audit)
    - pattern: ruby\s+-e\s
      reason: Ruby inline execution (logged for audit)
    - pattern: perl\s+-e\s
      reason: Perl inline execution (logged for audit)
    - pattern: ^(printenv|env)\s*$
      reason: Full environment variable dump (credential exposure risk)
    - pattern: ^set\s*$
      reason: Shell variable dump (credential exposure risk)
    - pattern: cat.*\.env
      reason: Reading .env file via cat (logged)
    - pattern: grep.*\.env
      reason: Grepping .env file (logged)
    - pattern: source.*\.env
      reason: Sourcing .env file into shell (logged)
paths:
  zeroAccess:
    - ~/.ssh/id_*
    - ~/.ssh/*.pem
    - ~/.aws/credentials
    - ~/.gnupg/private**
    - "**/service-account*.json"
  alertAccess:
    - ~/.claude/.env
    - "**/.env"
    - "**/.env.*"
  confirmAccess:
    - ~/.claude/.mcp.json
  readOnly:
    - /etc/**
    - ~/.claude/PAI/USER/SECURITY/PATTERNS.yaml
    - ~/.claude/PAI/USER/SECURITY/SECURITY_RULES.md
    - ~/.claude/hooks/SecurityPipeline.hook.ts
    - ~/.claude/hooks/ContentScanner.hook.ts
    - ~/.claude/hooks/SmartApprover.hook.ts
    - ~/.claude/hooks/PromptGuard.hook.ts
    - ~/.claude/hooks/security/pipeline.ts
    - ~/.claude/hooks/security/logger.ts
    - ~/.claude/hooks/security/types.ts
    - ~/.claude/PAI/MEMORY/SECURITY/**
  noDelete:
    - ~/.claude/hooks/**
    - ~/.claude/PAI/**
    - .git/**
projects: {}
