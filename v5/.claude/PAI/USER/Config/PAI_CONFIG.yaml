# PAI_CONFIG.yaml — User credentials and per-system configuration
#
# Bootstrap default. Run /interview or /setup to fill in your real values.
# The DA reads this at session start. Keys live in this file; secrets stay
# in environment variables and ~/.claude/.env (never committed).
#
# Schema: see PAI/DOCUMENTATION/Config/ConfigSystem.md

principal:
  name: "User"            # Your display name
  pronunciation: ""        # Phonetic spelling if needed
  timezone: "America/Los_Angeles"
  email: ""                # Primary contact email

da:
  name: "PAI"              # Your DA's name (e.g. {{DA_NAME}}, Aria, etc.)
  voice_id: ""             # ElevenLabs voice_id for TTS

services:
  # API key NAMES referenced from ~/.claude/.env — do NOT store keys here.
  anthropic_key_env: "ANTHROPIC_API_KEY"
  openai_key_env: "OPENAI_API_KEY"
  elevenlabs_key_env: "ELEVENLABS_API_KEY"

paths:
  # All paths are relative to ${HOME}/.claude unless absolute.
  # Override only if you have a non-default install.
  pai_dir: "PAI"
  memory_dir: "PAI/MEMORY"
  user_dir: "PAI/USER"

pulse:
  port: 31337
  voice_enabled: true

# Add your own keys below as you customize. The DA respects everything
# in this file but you decide what's worth tracking.
